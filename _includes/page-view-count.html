<div id="page-view-counter" class="page__views" hidden>
  <span aria-hidden="true">👁</span>
  <span id="page-view-number"></span>
  <span id="page-view-label">views</span>
</div>

<script>
  (function () {
    const counter = document.getElementById("page-view-counter");
    const number = document.getElementById("page-view-number");
    const label = document.getElementById("page-view-label");

    if (!counter || !number || !label) {
      return;
    }

    /*
     * Use the canonical URL so that the requested path is identical
     * to the path recorded by GoatCounter.
     */
    let pagePath = window.location.pathname;

    const canonical = document.querySelector('link[rel="canonical"]');

    if (canonical) {
      try {
        pagePath = new URL(canonical.href).pathname;
      } catch (error) {
        pagePath = window.location.pathname;
      }
    }

    const endpoint =
      "https://manwestc.goatcounter.com/counter/" +
      encodeURIComponent(pagePath) +
      ".json";

    function loadCounter(attempt) {
      fetch(endpoint)
        .then(function (response) {
          /*
           * A new page may temporarily return 404 until GoatCounter
           * has registered its first visit.
           */
          if (response.status === 404) {
            return { count: "0" };
          }

          if (!response.ok) {
            throw new Error(
              "GoatCounter returned HTTP " + response.status
            );
          }

          return response.json();
        })
        .then(function (data) {
          const count = data.count || "0";
          const numericCount = Number(
            String(count).replace(/[^\d]/g, "")
          );

          number.textContent = count;
          label.textContent = numericCount === 1 ? "view" : "views";
          counter.hidden = false;
        })
        .catch(function (error) {
          /*
           * Retry briefly in case the tracking request is still
           * being processed.
           */
          if (attempt < 2) {
            window.setTimeout(function () {
              loadCounter(attempt + 1);
            }, 1500);

            return;
          }

          /*
           * Do not show an unattractive error message to visitors.
           * Keep the counter hidden and leave diagnostic information
           * in the browser console.
           */
          console.warn("Page view counter unavailable:", error);
        });
    }

    loadCounter(0);
  })();
</script>

<style>
  .page__views {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin: 0.5rem 0 1rem;
    color: #6b7280;
    font-size: 0.85rem;
    line-height: 1.4;
  }

  .page__views[hidden] {
    display: none;
  }
</style>
