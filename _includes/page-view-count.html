<div id="page-view-counter" class="page__views" hidden>
  <span aria-hidden="true">👁</span>
  <span id="page-view-number"></span>
  <span id="page-view-label">views</span>
</div>

<script>
  (function loadPageViews(attempt) {
    const counter = document.getElementById("page-view-counter");
    const number = document.getElementById("page-view-number");
    const label = document.getElementById("page-view-label");

    if (!counter || !number || !label) {
      return;
    }

    /*
     * GoatCounter's get_data() returns the exact path used
     * by the tracking script. This avoids discrepancies involving
     * trailing slashes, canonical URLs or redirected paths.
     */
    if (
      window.goatcounter &&
      typeof window.goatcounter.get_data === "function"
    ) {
      const pageData = window.goatcounter.get_data();
      const pagePath = pageData.p;

      const endpoint =
        "https://manwestc.goatcounter.com/counter/" +
        encodeURIComponent(pagePath) +
        ".json";

      fetch(endpoint)
        .then(function (response) {
          if (response.status === 404) {
            return { count: "0" };
          }

          if (!response.ok) {
            throw new Error(
              "GoatCounter returned HTTP " + response.status
            );
          }

          return response.json();
        })
        .then(function (data) {
          const count = data.count || "0";
          const numericCount = Number(
            String(count).replace(/[^\d]/g, "")
          );

          number.textContent = count;
          label.textContent = numericCount === 1 ? "view" : "views";
          counter.hidden = false;
        })
        .catch(function (error) {
          console.warn("Page view counter unavailable:", error);
        });

      return;
    }

    if (attempt < 100) {
      window.setTimeout(function () {
        loadPageViews(attempt + 1);
      }, 100);
    } else {
      console.warn(
        "GoatCounter was not loaded. Check browser extensions or analytics configuration."
      );
    }
  })(0);
</script>

<style>
  .page__views {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin: 0.5rem 0 1rem;
    color: #6b7280;
    font-size: 0.85rem;
    line-height: 1.4;
  }

  .page__views[hidden] {
    display: none;
  }
</style>
