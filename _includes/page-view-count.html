<div id="page-view-counter" class="page__views">
  <span aria-hidden="true">👁</span>
  <span id="page-view-number">0</span>
  <span id="page-view-label">views</span>
</div>

<script>
  (function () {
    const counterNumber = document.getElementById(
      "page-view-number"
    );

    const counterLabel = document.getElementById(
      "page-view-label"
    );

    if (!counterNumber || !counterLabel) {
      return;
    }

    const pagePath = window.location.pathname || "/";

    const endpoint =
      "https://manwestc.goatcounter.com/counter/" +
      encodeURIComponent(pagePath) +
      ".json";

    fetch(endpoint)
      .then(function (response) {
        if (!response.ok) {
          throw new Error(
            "GoatCounter returned HTTP " + response.status
          );
        }

        return response.json();
      })
      .then(function (data) {
        const count = data.count || "0";

        const numericCount = Number(
          String(count).replace(/[^\d]/g, "")
        );

        counterNumber.textContent = count;

        counterLabel.textContent =
          numericCount === 1 ? "view" : "views";
      })
      .catch(function (error) {
        /*
         * Keep a visible zero instead of displaying
         * an error message to visitors.
         */
        counterNumber.textContent = "0";
        counterLabel.textContent = "views";

        console.warn(
          "GoatCounter page counter unavailable:",
          error
        );
      });
  })();
</script>

<style>
  .page__views {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin: 0.5rem 0 1rem;
    color: #6b7280;
    font-size: 0.85rem;
    line-height: 1.4;
  }
</style>
