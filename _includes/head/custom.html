{% include base_path %}

<!-- =====================================================
     Favicons and web application metadata
====================================================== -->

<link rel="apple-touch-icon"
      sizes="180x180"
      href="{{ base_path }}/images/site-logo.png?v=M44lzPylqQ">

<link rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ base_path }}/images/favicon-32x32.png?v=M44lzPylqQ">

<link rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ base_path }}/images/favicon-16x16.png?v=M44lzPylqQ">

<link rel="manifest"
      href="{{ base_path }}/images/manifest.json?v=M44lzPylqQ">

<link rel="mask-icon"
      href="{{ base_path }}/images/safari-pinned-tab.svg?v=M44lzPylqQ"
      color="#000000">

<link rel="shortcut icon"
      href="{{ base_path }}/images/favicon.ico?v=M44lzPylqQ">

<meta name="msapplication-TileColor" content="#000000">

<meta name="msapplication-TileImage"
      content="{{ base_path }}/images/mstile-144x144.png?v=M44lzPylqQ">

<meta name="msapplication-config"
      content="{{ base_path }}/images/browserconfig.xml?v=M44lzPylqQ">

<meta name="theme-color" content="#ffffff">

<!-- =====================================================
     Academicons
====================================================== -->

<link rel="stylesheet"
      href="{{ base_path }}/assets/css/academicons.css">

<!-- =====================================================
     MathJax 4
     Loaded only on pages with `mathjax: true`
====================================================== -->

{% if page.mathjax %}

<script>
  window.MathJax = {
    tex: {
      inlineMath: {
        '[+]': [
          ['$', '$']
        ]
      },
      processEscapes: true
    },

    svg: {
      fontCache: 'global'
    }
  };
</script>

<script
  defer
  id="MathJax-script"
  src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js">
</script>

{% endif %}
